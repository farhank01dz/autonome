# Autonome - Docker Compose Configuration
# For local development and EC2 deployment
# Uses NeonDB (external PostgreSQL) - no local database container needed

services:
  # Autonome Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-Autonome}
    container_name: autonome-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NIM_API_KEY: ${NIM_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      LIGHTER_API_KEY_INDEX: ${LIGHTER_API_KEY_INDEX:-2}
      LIGHTER_BASE_URL: ${LIGHTER_BASE_URL:-https://mainnet.zklighter.elliot.ai}
      TRADING_MODE: ${TRADING_MODE:-simulated}
      SIM_INITIAL_CAPITAL: ${SIM_INITIAL_CAPITAL:-10000}
      SIM_QUOTE_CURRENCY: ${SIM_QUOTE_CURRENCY:-USDT}
      SIM_REFRESH_INTERVAL_MS: ${SIM_REFRESH_INTERVAL_MS:-30000}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Autonome}
    volumes:
      - ~/autonome-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

networks:
  default:
    name: autonome-network
