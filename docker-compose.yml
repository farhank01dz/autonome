services:
  db:
    image: postgres:16-alpine
    container_name: autonome-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: autonome
      POSTGRES_PASSWORD: autonome_secret
      POSTGRES_DB: autonome
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autonome -d autonome"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: smoggyowo/autonome:latest
    container_name: autonome
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://autonome:autonome_secret@db:5432/autonome
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - autonome_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  migrate:
    image: smoggyowo/autonome:latest
    container_name: autonome-migrate
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://autonome:autonome_secret@db:5432/autonome
    depends_on:
      db:
        condition: service_healthy
    command: ["bun", "run", "db:push"]
    profiles:
      - migrate

  seed:
    image: smoggyowo/autonome:latest
    container_name: autonome-seed
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://autonome:autonome_secret@db:5432/autonome
    depends_on:
      db:
        condition: service_healthy
    command: ["bun", "run", "scripts/seed.ts"]
    profiles:
      - seed

volumes:
  postgres_data:
  autonome_logs:

