services:
  # The Autonome API Server (Backend)
  api:
    image: smoggyowo/autonome-api:latest
    container_name: autonome-api
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://autonome:autonome_secret@db:5432/autonome
      - PORT=8081
      
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Migration Runner (Runs once on startup to ensure DB schema exists)
  migrate:
    image: smoggyowo/autonome-api:latest
    container_name: autonome-migrate
    restart: "no"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://autonome:autonome_secret@db:5432/autonome
    depends_on:
      db:
        condition: service_healthy
    # Using 'db:push' for rapid prototyping/safe-ish schema updates. 
    # Use 'db:migrate' if you rely on migration files.
    command: ["bun", "run", "db:push"]

  # Postgres Database
  db:
    image: postgres:16-alpine
    container_name: autonome-db
    restart: always
    environment:
      POSTGRES_USER: autonome
      POSTGRES_PASSWORD: autonome_secret
      POSTGRES_DB: autonome
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autonome -d autonome"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
